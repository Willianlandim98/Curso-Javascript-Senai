<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista</title>
  </head>
  <body>
    <h1>Trabalhando com Listas</h1>
    
    <h2>Listas não ordenadas - Compras de mateirais escolares</h2>
    
    <ul type="square">
      <li>Caderno</li>
      <li>Caneta</li>
      <li>Borracha</li>
      <li>Mochila</li>
    </ul>

    <h2>Listas ordenadas - Receita de café</h2>
   
    <ol type="1" start="5">
      <li>Esquentar a água</li>
      <li>Adoçar a água</li>
      <li>Colocam o pó de café no filtro</li>
      <li>Coar o cadé com a água quente</li>
      <li>Servir o café</li>
    </ol>

  </body>
</html>
