<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio ex007</title>

    <style>

 *{
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      div{
        background-color: lightgreen;
        width: 200px; /*Largura*/
        height: 200px; /*Altura*/
        border: 3px solid black;
        margin-bottom: 20px;
        margin-top: 20px;
        text-align: center;
      }
#div1:hover{
    background-color: red;
}

#div2:hover{
    background-color: green;
}

#div3:hover{
    background-color: blue;
}

    </style>

</head>
<body>
 
    <div id="div1">01</div> 
    <div id="div2">02</div> 
    <div id="div3">03</div> 

</body>
</html>
